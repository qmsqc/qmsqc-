<div class="container">

  <!-- LOGO -->
  <img src="logo.jpg" class="logo" id="logo" alt="Company Logo">

  <!-- COMPANY NAME -->
  <h1 class="company-name">QMSQC INDUSTRIAL TRAINING & CERTIFICATION PVT.,LTD.,</h1>

  <!-- HEADING -->
  <h2>Verify the authenticity of a certified document</h2>

  <!-- CARD -->
  <div class="card">
    <input type="text" id="cert" placeholder="Enter Certificate Number">
    <button onclick="verify()">Verify</button>
    <div id="result"></div>
  </div>

</div>

<script>
function verify(){
  var id = document.getElementById("cert").value.trim().toUpperCase();

  var data = {
    "Q-2025-16401": {
      name: "ANANTHA PRABU K",
      course: "Lead Auditor",
      issueDate: "19/03/2026",
      status: "Valid"
    }
  };

  if(data[id]){
    document.getElementById("result").innerHTML =
      "<h3 style='color:green;'>Certificate Verified ✅</h3>" +
      "<div class='result-card'>" +
      "<div class='box'><strong>Name:</strong><br>" + data[id].name + "</div>" +
      "<div class='box'><strong>Course:</strong><br>" + data[id].course + "</div>" +
      "<div class='box'><strong>Certificate Number:</strong><br>" + id + "</div>" +
      "<div class='box'><strong>Issue Date:</strong><br>" + data[id].issueDate + "</div>" +
      "<div class='box'><strong>Status:</strong><br>" + data[id].status + "</div>" +
      "</div>";
  }
  else{
    document.getElementById("result").innerHTML = 
      "<span style='color:red;'>Invalid Certificate ❌</span>";
  }
}

// URL Query Parameter Handling
const params = new URLSearchParams(window.location.search);
const certId = params.get("id");
if(certId){
  document.getElementById("cert").value = certId;
  verify(); // Auto-verify if id is present
}
</script>
